<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journey Carousel</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f4f4f4;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.journey-carousel-wrapper {
  background: #fff;
  text-align: center;
  padding-bottom: 40px;
}

.journey-carousel-wrapper h2 {
  font-size: 36px;
  margin-top: 40px;
  font-weight: 800;
  color: #222;
  letter-spacing: 1px;
}

.journey-carousel-wrapper p {
  font-size: 20px;
  margin-bottom: 40px;
  color: #444;
  font-weight: 500;
}

.carousel {
  position: relative;
  width: 90%;
  max-width: 1300px;
  margin: 0 auto;
  overflow: hidden;
  border-top-left-radius: 10%;
  border-top-right-radius: 10%;
}

/* Scroll wrapper with hidden scrollbar */
.carousel-scroll-wrapper {
  overflow-x: auto;
  scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;

  /* Hide scrollbar */
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE and Edge */
}

.carousel-scroll-wrapper::-webkit-scrollbar {
  display: none; /* Chrome, Safari */
}

.carousel-track {
  display: flex;
  gap: 25px;
  transition: transform 0.6s ease-in-out;
  scroll-snap-align: start;
  min-width: max-content;
}

.card {
  position: relative;
  min-width: 300px;
  max-width: 300px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  transform: scale(1);
  transition: transform 0.3s ease-in-out;
  scroll-snap-align: start;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
}

.location {
  position: absolute;
  bottom: 15px;
  left: 15px;
  background-color: #000000cc;
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  display: flex;
  align-items: center;
  font-weight: 500;
}

.location::before {
  content: '\1F4CD';
  margin-right: 6px;
}

.arrow {
  position: absolute;
  top: 45%;
  transform: translateY(-50%);
  font-size: 26px;
  color: white;
  background-color: #00bcd4;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

.arrow.left {
  left: 0px;
}

.arrow.right {
  right: 0px;
}

@media (max-width: 768px) {
  .journey-carousel-wrapper h2 {
    font-size: 28px;
  }

  .journey-carousel-wrapper p {
    font-size: 16px;
  }

  .card {
    min-width: 250px;
    max-width: 250px;
  }

  .card img {
    height: auto;
  }

  .arrow.left {
    left: 5px;
  }

  .arrow.right {
    right: 5px;
  }
}

  </style>
</head>
<body>

  <div class="journey-carousel-wrapper">
    <h2>JOURNEY IN FRAMES</h2>
    <p>Pictures Perfect Moments</p>

    <div class="carousel">
      <div class="arrow left" onclick="moveSlide(-1)">&#10094;</div>

      <div class="carousel-scroll-wrapper">
        <div class="carousel-track" id="carouselTrack">
          <div class="card">
            <img src="https://images.wanderon.in/new-homepage-data/Gallery/vietnam%202" alt="Vietnam">
            <div class="location">Vietnam</div>
          </div>
          <div class="card">
            <img src="https://images.wanderon.in/new-homepage-data/Gallery/dubai%20re%2001?updatedAt=1711452484035" alt="Dubai">
            <div class="location">Dubai</div>
          </div>
          <div class="card">
            <img src="https://images.wanderon.in/new-homepage-data/Gallery/bhutan%204" alt="Bhutan">
            <div class="location">Bhutan</div>
          </div>
          <div class="card">
            <img src="https://images.wanderon.in/new-homepage-data/Gallery/bhutan%204" alt="Kerala">
            <div class="location">Kerala</div>
          </div>
        </div>
      </div>

      <div class="arrow right" onclick="moveSlide(1)">&#10095;</div>
    </div>
  </div>

  <script>
    const track = document.getElementById("carouselTrack");
    const cards = document.querySelectorAll(".card");
    const scrollWrapper = track.parentElement;
    let index = 0;

    function moveSlide(direction) {
      const cardWidth = cards[0].offsetWidth + 25;
      index = Math.max(0, Math.min(index + direction, cards.length - 1));
      const offset = index * cardWidth;

      // Scroll and transform together
      scrollWrapper.scrollTo({
        left: offset,
        behavior: "smooth"
      });

      track.style.transform = `translateX(-${offset}px)`;
    }
  </script>

</body>
</html>
